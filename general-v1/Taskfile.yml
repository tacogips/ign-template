version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  status:
    desc: Show tracked investigation artifacts
    cmds:
      - find design-docs impl-plans -maxdepth 2 -type f | sort

  browser-install:
    desc: Install the Chromium browser used by Playwright
    cmds:
      - playwright install chromium

  browser-check:
    desc: Show the available investigation tools
    cmds:
      - agent-browser --help
      - playwright --version

  gitleaks:
    desc: Scan staged changes for secrets before commit
    cmds:
      - gitleaks git --pre-commit --redact --staged --verbose

  install-git-hooks:
    desc: Install the Nix-managed pre-commit hook configuration
    cmds:
      - nix develop -c pre-commit install --install-hooks
