version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install frontend dependencies
    cmds:
      - bun install

  dev:
    desc: Run the Tauri app in development mode
    cmds:
      - bun run tauri dev

  build:
    desc: Build frontend assets and the Tauri desktop binary
    cmds:
      - bun run build
      - CARGO_TERM_QUIET=true cargo build --release --manifest-path src-tauri/Cargo.toml

  tauri-build:
    desc: Build the app through the Tauri CLI
    cmds:
      - CARGO_TERM_QUIET=true bun run tauri build

  test:
    desc: Run frontend and backend tests
    cmds:
      - bun run typecheck
      - CARGO_TERM_QUIET=true cargo test --manifest-path src-tauri/Cargo.toml

  check:
    desc: Run frontend typecheck and backend cargo check
    cmds:
      - bun run typecheck
      - CARGO_TERM_QUIET=true cargo check --manifest-path src-tauri/Cargo.toml

  clippy:
    desc: Run clippy for the Tauri backend
    cmds:
      - CARGO_TERM_QUIET=true cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  fmt:
    desc: Format frontend and backend sources
    cmds:
      - bunx prettier --write "src/**/*.{ts,css}" "vite.config.ts"
      - CARGO_TERM_QUIET=true cargo fmt --manifest-path src-tauri/Cargo.toml

  fmt-check:
    desc: Check backend formatting
    cmds:
      - CARGO_TERM_QUIET=true cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

  lint:
    desc: Run all lints
    cmds:
      - task: fmt-check
      - task: clippy

  gitleaks:
    desc: Scan staged changes for secrets before commit
    cmds:
      - gitleaks git --pre-commit --redact --staged --verbose

  install-git-hooks:
    desc: Install the Nix-managed pre-commit hook configuration
    cmds:
      - nix develop -c pre-commit install --install-hooks

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist node_modules src-tauri/target target

  ci:
    desc: Run all CI checks
    cmds:
      - task: check
      - task: clippy
      - task: test
      - task: build
